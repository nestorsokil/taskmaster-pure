taskmaster {
  db {
    url      = "jdbc:postgresql://localhost:5432/taskmaster?stringtype=unspecified"
    url      = ${?TASKMASTER_DB_URL}
    username = "postgres"
    username = ${?TASKMASTER_DB_USERNAME}
    password = "postgres"
    password = ${?TASKMASTER_DB_PASSWORD}
  }

  heartbeat {
    stale-threshold-seconds = 5
    dead-threshold-seconds  = 10
  }

  reaper {
    interval-ms = 5000
  }

  retry {
    base-delay-seconds = 1
  }

  retention {
    ttl          = 3 seconds
    interval-ms  = 2000
    batch-size   = 500
  }

  webhook {
    hmac-secret          = "test-webhook-secret"
    hmac-secret          = ${?TASKMASTER_WEBHOOK_HMAC_SECRET}
    http-timeout-seconds = 10
  }
}
